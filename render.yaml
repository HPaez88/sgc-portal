services:
  - type: web
    name: sgc-portal
    env: python
    buildCommand: |
      pip install -r requirements.txt
      cd frontend && npm install && npm run build
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./sgc_portal.db
      - key: ALLOWED_ORIGINS
        value: "https://sgc-portal.onrender.com"
      - key: ENVIRONMENT
        value: production
    autoDeploy: true