services:
  - type: web
    name: sgc-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./sgc_portal.db
      - key: ALLOWED_ORIGINS
        value: https://sgc-portal.onrender.com
      - key: ENVIRONMENT
        value: production
    autoDeploy: true

  - type: web
    name: sgc-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublish: frontend/dist
    envVars:
      - key: API_BASE
        value: https://sgc-backend.onrender.com
    autoDeploy: true